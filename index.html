<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ucapan Untuk Kamu</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6f6,#d6f3ff);
font-family: "Comic Sans MS", cursive;
overflow:hidden;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:muncul 1s ease;
}

h1{
color:#ff5ea8;
font-size:32px;
animation:lompat 1.2s infinite alternate;
}

p{
font-size:20px;
color:#444;
margin-top:10px;
}

.boneka{
width:150px;
animation:terbang 3s ease-in-out infinite;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff6bb3;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff3f9e;
transform:scale(1.1);
}

@keyframes muncul{
from{transform:scale(0);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes lompat{
from{transform:translateY(0);}
to{transform:translateY(-8px);}
}

@keyframes terbang{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}

/* stiker jatuh */

.stiker{
position:absolute;
font-size:30px;
animation:jatuh 6s linear infinite;
}

@keyframes jatuh{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="card">

<img class="boneka" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png">

<h1>Hai Kamu 👋</h1>

<p>
Hai kamu, gimana kabaranya,<br>
sehat-sehat aja kamunya? 😊
</p>

<button onclick="playMusic()">Klik Aku 🎵</button>

</div>

<!-- stiker boneka / emoji -->

<div class="stiker" style="left:10%">🧸</div>
<div class="stiker" style="left:30%;animation-delay:2s">🐻</div>
<div class="stiker" style="left:50%;animation-delay:4s">🧸</div>
<div class="stiker" style="left:70%;animation-delay:1s">🐻</div>
<div class="stiker" style="left:90%;animation-delay:3s">🧸</div>

<audio id="musik">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

function playMusic(){
document.getElementById("musik").play();
}

</script>

</body>
</html>
